[pytest]
# PyTest Configuration for QNIM Physics Layers Testing

# Directories to search for tests
testpaths = test

# File patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for organizing tests
markers =
    unit: Unit tests for individual physics layers
    integration: Integration tests for full pipeline
    sanity: Quick sanity check tests
    slow: Slow tests requiring multiple iterations
    edge_case: Edge case and error handling tests

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Minimum Python version
minversion = 3.8
